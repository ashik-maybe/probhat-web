<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
        <meta name="author" content="ashik-maybe" />
        <meta
            name="description"
            content="probhat-web - Type in Bangla using virtual Probhat keyboard on your browser, without installing anything."
        />
        <meta name="theme-color" content="#ffffff" />

        <title>অনলাইন প্রভাত কিবোর্ড</title>

        <link rel="icon" type="image/x-icon" href="favicon.ico?t=20160710" />
        <link rel="apple-touch-icon" href="apple-touch-icon.png?t=20160710" />

        <!-- Preload critical fonts -->
        <link
            rel="preload"
            href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500:600;700&family=Noto+Sans+Bengali:wght@400;500:600;700&display=swap"
            as="style"
            onload="this.rel = 'stylesheet'"
        />
        <noscript
            ><link
                rel="stylesheet"
                href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500:600;700&family=Noto+Sans+Bengali:wght@400;500:600;700&display=swap"
        /></noscript>

        <link rel="stylesheet" href="src/style.css" />

        <!-- jQuery & IME -->
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.ime/0.3.0/jquery.ime.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.ime/0.3.0/jquery.ime.selector.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.ime/0.3.0/jquery.ime.preferences.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.ime/0.3.0/jquery.ime.inputmethods.min.js"></script>

        <script src="src/main.js" defer></script>
    </head>

    <body class="page">
        <!-- Navbar -->
        <nav class="nav">
            <div class="nav-inner">
                <div class="toolbar-group">
                    <img src="favicon.ico" alt="Logo" class="icon" style="width: 1.75rem; height: 1.75rem" />
                    <span class="logo-text">অনলাইন প্রভাত কিবোর্ড</span>
                </div>
                <div class="toolbar-group" style="width:auto">
                    <a href="practice.html" class="btn btn-secondary" style="width:auto">প্রাকটিস</a>
                    <a
                        href="https://github.com/ashik-maybe/probhat-online"
                        target="_blank"
                        rel="noopener noreferrer"
                        class="btn-icon btn-ghost"
                    >
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="18"
                            height="18"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <path
                                d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"
                            />
                            <path d="M9 18c-4.51 2-5-2-7-2" />
                        </svg>
                    </a>
                </div>
            </div>
        </nav>

        <!-- Main -->
        <main class="main">
            <!-- Toolbar -->
            <div class="toolbar">
                <div class="toolbar-group">
                    <button
                        id="action-copy"
                        class="btn btn-secondary"
                        aria-label="Copy text"
                    >
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="16"
                            height="16"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            class="icon"
                        >
                            <rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
                            <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
                        </svg>
                        <span class="btn-label">Copy</span>
                    </button>
                    <button
                        id="action-clear"
                        class="btn btn-secondary"
                        aria-label="Clear text"
                    >
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="16"
                            height="16"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            class="icon"
                        >
                            <path d="M3 6h18" />
                            <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
                            <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
                        </svg>
                        <span class="btn-label">Clear</span>
                    </button>
                    <button
                        id="action-share"
                        class="btn-icon hidden"
                        aria-label="Share text"
                    >
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="16"
                            height="16"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <circle cx="18" cy="5" r="3" />
                            <circle cx="6" cy="12" r="3" />
                            <circle cx="18" cy="19" r="3" />
                            <path d="M8.59 13.51l6.83 3.98" />
                            <path d="M15.41 6.51l-6.82 3.98" />
                        </svg>
                    </button>
                    <span id="counter" class="counter">0 chars • 0 words</span>
                </div>
                <div class="toolbar-group">
                    <button
                        id="action-layout"
                        class="btn btn-secondary"
                        aria-expanded="false"
                        aria-controls="layout-container"
                        aria-label="Toggle keyboard layout"
                    >
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="16"
                            height="16"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            class="icon"
                        >
                            <rect width="20" height="16" x="2" y="4" rx="2" />
                            <path d="M6 8h.001" />
                            <path d="M10 8h.001" />
                            <path d="M14 8h.001" />
                            <path d="M18 8h.001" />
                            <path d="M8 12h.001" />
                            <path d="M12 12h.001" />
                            <path d="M16 12h.001" />
                            <path d="M7 16h10" />
                        </svg>
                        <span class="btn-label">Layout</span>
                        <span class="shortcut-tip">Ctrl+L</span>
                    </button>
                    <button
                        id="action-pin"
                        class="btn btn-ghost"
                        aria-pressed="false"
                        aria-label="Pin layout to bottom"
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="icon">
                            <line x1="12" y1="4" x2="12" y2="16"/>
                            <polyline points="8 8 12 4 16 8"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Editor -->
            <div class="editor">
                <textarea
                    id="banglapad"
                    placeholder="এখানে বাংলা লিখুন..."
                    aria-label="Bangla text input area"
                    enterkeyhint="go"
                    inputmode="text"
                    autocapitalize="sentences"
                    spellcheck="true"
                ></textarea>

                <div
                    id="layout-container"
                    class="layout-box hidden"
                    role="region"
                    aria-label="Probhat keyboard layout reference"
                >
                    <div class="layout-img-wrap">
                        <img
                            src="public/KB-Bengali-Probhat.svg"
                            class="layout-img"
                            alt="Probhat Keyboard Layout"
                            loading="lazy"
                            decoding="async"
                        />
                    </div>
                </div>
            </div>
        </main>

        <!-- Instant Toast -->
        <div
            id="copy-toast"
            class="toast hidden"
        >
            <svg
                xmlns="http://www.w3.org/2000/svg"
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="3"
                stroke-linecap="round"
                stroke-linejoin="round"
            >
                <path d="M20 6 9 17l-5-5" />
            </svg>
            Copied
        </div>
    </body>
</html>
