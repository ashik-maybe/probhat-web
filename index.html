<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
        <meta name="author" content="ashik-maybe" />
        <meta
            name="description"
            content="probhat-web - Type in Bangla using virtual Probhat keyboard on your browser, without installing anything."
        />
        <meta name="theme-color" content="#ffffff" />

        <title>অনলাইন প্রভাত কিবোর্ড</title>

        <link rel="icon" type="image/x-icon" href="favicon.ico?t=20160710" />
        <link rel="apple-touch-icon" href="apple-touch-icon.png?t=20160710" />

        <!-- Preload critical fonts -->
        <link
            rel="preload"
            href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500:600;700&family=Noto+Sans+Bengali:wght@400;500:600;700&display=swap"
            as="style"
            onload="this.rel = 'stylesheet'"
        />
        <noscript
            ><link
                rel="stylesheet"
                href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500:600;700&family=Noto+Sans+Bengali:wght@400;500:600;700&display=swap"
        /></noscript>

        <!-- Tailwind CSS -->
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        fontFamily: {
                            sans: ["Plus Jakarta Sans", "system-ui", "sans-serif"],
                            bengali: ["Noto Sans Bengali", "system-ui", "sans-serif"],
                        },
                        colors: {
                            border: "hsl(var(--border))",
                            input: "hsl(var(--input))",
                            ring: "hsl(var(--ring))",
                            background: "hsl(var(--background))",
                            foreground: "hsl(var(--foreground))",
                            primary: {
                                DEFAULT: "hsl(var(--primary))",
                                foreground: "hsl(var(--primary-foreground))",
                            },
                            secondary: {
                                DEFAULT: "hsl(var(--secondary))",
                                foreground: "hsl(var(--secondary-foreground))",
                            },
                            muted: {
                                DEFAULT: "hsl(var(--muted))",
                                foreground: "hsl(var(--muted-foreground))",
                            },
                            accent: {
                                DEFAULT: "hsl(var(--accent))",
                                foreground: "hsl(var(--accent-foreground))",
                            },
                            card: {
                                DEFAULT: "hsl(var(--card))",
                                foreground: "hsl(var(--card-foreground))",
                            },
                        },
                        borderRadius: {
                            lg: "var(--radius)",
                            md: "calc(var(--radius) - 2px)",
                            sm: "calc(var(--radius) - 4px)",
                        },
                    },
                },
            };
        </script>
        <style>
            @layer base {
                :root {
                    --background: 0 0% 100%;
                    --foreground: 222.2 84% 4.9%;
                    --card: 0 0% 100%;
                    --card-foreground: 222.2 84% 4.9%;
                    --primary: 222.2 47.4% 11.2%;
                    --primary-foreground: 210 40% 98%;
                    --secondary: 210 40% 96.1%;
                    --secondary-foreground: 222.2 47.4% 11.2%;
                    --muted: 210 40% 96.1%;
                    --muted-foreground: 215.4 16.3% 46.9%;
                    --accent: 210 40% 96.1%;
                    --accent-foreground: 222.2 47.4% 11.2%;
                    --destructive: 0 84.2% 60.2%;
                    --destructive-foreground: 210 40% 98%;
                    --border: 214.3 31.8% 91.4%;
                    --input: 214.3 31.8% 91.4%;
                    --ring: 222.2 84% 4.9%;
                    --radius: 0.5rem;
                }
                body {
                    @apply bg-background text-foreground font-sans antialiased min-h-screen flex flex-col;
                    padding-top: env(safe-area-inset-top);
                    padding-bottom: env(safe-area-inset-bottom);
                }
                @media (prefers-reduced-motion: reduce) {
                    *,
                    *::before,
                    *::after {
                        animation-duration: 0.01ms !important;
                        transition-duration: 0.01ms !important;
                    }
                }
            }
            .imeselector {
                display: none !important;
            }
            #banglapad {
                min-height: clamp(250px, 50dvh, 400px);
            }
            #layout-container {
                transition: opacity 0.15s ease;
                transform-origin: top center;
            }
            #layout-container.state-hidden {
                opacity: 0;
                pointer-events: none;
            }
            #layout-container.state-visible {
                opacity: 1;
                pointer-events: auto;
            }
            .touch-btn {
                @apply min-h-[44px] min-w-[44px] touch-action-manipulation select-none active:scale-[0.98];
            }
            #copy-toast {
                opacity: 1;
                transform: none;
            }
            #copy-toast.hidden {
                display: none;
            }
            /* Layout button tooltip */
            #action-layout {
                position: relative;
            }
            #action-layout .shortcut-tip {
                position: absolute;
                bottom: 100%;
                left: 50%;
                transform: translateX(-50%) translateY(4px);
                padding: 3px 7px;
                background: var(--foreground);
                color: var(--background);
                font-size: 10px;
                border-radius: 3px;
                white-space: nowrap;
                opacity: 0;
                pointer-events: none;
                transition:
                    opacity 0.1s ease,
                    transform 0.1s ease;
                z-index: 10;
            }
            #action-layout:hover .shortcut-tip {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
            #layout-container.pinned {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                z-index: 30;
                margin: 0;
                border-radius: 0;
                border-left: none;
                border-right: none;
                border-bottom: none;
                box-shadow: 0 -4px 16px rgba(0,0,0,0.1);
            }
            #action-pin {
                display: none;
            }
            #action-pin.pin-visible {
                display: inline-flex;
            }
            @media (max-width: 767px) {
                #action-pin {
                    display: none !important;
                }
            }
            #action-pin[aria-pressed="true"] svg {
                transform: rotate(180deg);
            }
            main.pin-active {
                padding-bottom: var(--layout-height, 0px);
                transition: padding-bottom 0.15s ease;
            }
        </style>

        <!-- jQuery & IME -->
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.ime/0.3.0/jquery.ime.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.ime/0.3.0/jquery.ime.selector.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.ime/0.3.0/jquery.ime.preferences.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.ime/0.3.0/jquery.ime.inputmethods.min.js"></script>

        <script>
            $(document).ready(function () {
                $.ime.preferences.registry.language = "bn";
                $.ime.preferences.registry.showSelector = false;
                $.ime.preferences.registry.imes = { bn: "bn-probhat", en: "system" };
                $.ime.preferences.getDefaultLanguage = () => "bn";
                $("textarea").ime({
                    languages: ["bn"],
                    imePath: "https://cdnjs.cloudflare.com/ajax/libs/jquery.ime/0.3.0/",
                });

                // Copy
                $("#action-copy").click(function () {
                    navigator.clipboard
                        .writeText($("#banglapad").val())
                        .then(() => {
                            showCopiedToast();
                            if (
                                navigator.share &&
                                /Android|iPhone|iPad/i.test(navigator.userAgent)
                            ) {
                                $("#action-share").removeClass("hidden");
                            }
                        })
                        .catch(console.error);
                });

                // Share (mobile only)
                $("#action-share").click(async function () {
                    const text = $("#banglapad").val();
                    if (navigator.share && text) {
                        try {
                            await navigator.share({ title: "Bangla Text", text });
                        } catch (err) {
                            if (err.name !== "AbortError") console.error(err);
                        }
                    }
                });

                // Clear
                $("#action-clear").click(function () {
                    $("#banglapad").val("");
                    localStorage.removeItem("banglapad_content");
                    updateCounter();
                    $("#banglapad").focus();
                });

                // Auto-save + Counter
                $("#banglapad").focus();
                const saved = localStorage.getItem("banglapad_content");
                if (saved) $("#banglapad").val(saved);
                updateCounter();

                $("#banglapad").on("input", function () {
                    localStorage.setItem("banglapad_content", $(this).val());
                    updateCounter();
                    if (!$(this).val()) $("#action-share").addClass("hidden");
                });

                function updateCounter() {
                    const text = $("#banglapad").val().trim();
                    const chars = text.length;
                    const words = text ? text.split(/\s+/).filter((w) => w.length > 0).length : 0;
                    $("#counter").text(
                        `${chars} char${chars !== 1 ? "s" : ""} • ${words} word${words !== 1 ? "s" : ""}`,
                    );
                }

                // Layout Toggle (instant)
                const layoutEl = document.getElementById("layout-container");
                const layoutBtn = document.getElementById("action-layout");
                let layoutOpen = false;

                function toggleLayout() {
                    if (layoutOpen && pinned) {
                        pinned = false;
                        layoutEl.classList.remove("pinned");
                        pinBtn.setAttribute("aria-pressed", "false");
                        mainEl.classList.remove("pin-active");
                    }
                    layoutOpen = !layoutOpen;
                    if (layoutOpen) {
                        layoutEl.classList.remove("hidden", "state-hidden");
                        layoutEl.classList.add("state-visible");
                        layoutBtn.classList.add("bg-accent", "text-accent-foreground");
                        layoutBtn.setAttribute("aria-expanded", "true");
                        pinBtn.classList.add("pin-visible");
                    } else {
                        layoutEl.classList.add("state-hidden");
                        layoutBtn.classList.remove("bg-accent", "text-accent-foreground");
                        layoutBtn.setAttribute("aria-expanded", "false");
                        layoutEl.classList.add("hidden");
                        pinBtn.classList.remove("pin-visible");
                    }
                    $("#banglapad").focus();
                }
                layoutBtn.addEventListener("click", toggleLayout);
                layoutEl.addEventListener("click", (e) => {
                    if (e.target === layoutEl) toggleLayout();
                });
                document.addEventListener("keydown", (e) => {
                    if (e.ctrlKey && e.key.toLowerCase() === "l") {
                        e.preventDefault();
                        toggleLayout();
                    }
                });

                // SVG Fallback
                const layoutImg = layoutEl.querySelector("img");
                if (layoutImg)
                    layoutImg.onerror = () => (layoutImg.src = "public/probhat-layout.png");

                // Pin to bottom
                const pinBtn = document.getElementById("action-pin");
                const mainEl = document.querySelector("main");
                let pinned = false;

                function updatePinPadding() {
                    if (pinned) {
                        const h = layoutEl.offsetHeight;
                        mainEl.style.setProperty("--layout-height", h + "px");
                        mainEl.classList.add("pin-active");
                    } else {
                        mainEl.classList.remove("pin-active");
                    }
                }

                pinBtn.addEventListener("click", function () {
                    pinned = !pinned;
                    layoutEl.classList.toggle("pinned", pinned);
                    pinBtn.setAttribute("aria-pressed", String(pinned));
                    updatePinPadding();
                    $("#banglapad").focus();
                });

                const ro = new ResizeObserver(function () {
                    if (pinned) updatePinPadding();
                });
                ro.observe(layoutEl);

                // Hide share button by default
                if (!/Android|iPhone|iPad/i.test(navigator.userAgent)) {
                    $("#action-share").addClass("hidden");
                }
            });

            function showCopiedToast() {
                const toast = document.getElementById("copy-toast");
                toast.classList.remove("hidden");
                setTimeout(() => toast.classList.add("hidden"), 1500);
            }
        </script>
    </head>

    <body>
        <!-- Navbar: compact, no backdrop-blur -->
        <nav class="border-b bg-background sticky top-0 z-40">
            <div
                class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 h-14 flex items-center justify-between"
            >
                <div class="flex items-center gap-3">
                    <img src="favicon.ico" alt="Logo" class="w-7 h-7" />
                    <span class="font-bold text-base tracking-tight">অনলাইন প্রভাত কিবোর্ড</span>
                </div>
                <a
                    href="https://github.com/ashik-maybe/probhat-online"
                    target="_blank"
                    rel="noopener noreferrer"
                    class="inline-flex items-center justify-center rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 hover:bg-accent hover:text-accent-foreground h-9 w-9 touch-btn"
                    aria-label="View source on GitHub"
                >
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="18"
                        height="18"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <path
                            d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"
                        />
                        <path d="M9 18c-4.51 2-5-2-7-2" />
                    </svg>
                </a>
            </div>
        </nav>

        <!-- Main -->
        <main
            class="flex-1 container max-w-5xl mx-auto px-4 py-4 sm:py-6 sm:px-6 lg:px-8 flex flex-col gap-3"
        >
            <!-- Toolbar -->
            <div
                class="flex flex-col sm:flex-row justify-between items-stretch sm:items-center gap-2 sm:gap-3"
            >
                <div class="flex items-center gap-1.5 w-full sm:w-auto">
                    <button
                        id="action-copy"
                        class="inline-flex items-center justify-center rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 border border-input bg-background hover:bg-accent hover:text-accent-foreground h-9 px-3 w-full sm:w-auto gap-1.5 touch-btn"
                        aria-label="Copy text"
                    >
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="16"
                            height="16"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            class="opacity-90"
                        >
                            <rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
                            <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
                        </svg>
                        <span class="hidden sm:inline">Copy</span>
                    </button>
                    <button
                        id="action-clear"
                        class="inline-flex items-center justify-center rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 border border-input bg-background hover:bg-accent hover:text-accent-foreground h-9 px-3 w-full sm:w-auto gap-1.5 touch-btn"
                        aria-label="Clear text"
                    >
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="16"
                            height="16"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            class="opacity-90"
                        >
                            <path d="M3 6h18" />
                            <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
                            <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
                        </svg>
                        <span class="hidden sm:inline">Clear</span>
                    </button>
                    <button
                        id="action-share"
                        class="inline-flex items-center justify-center rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 border border-input bg-background hover:bg-accent hover:text-accent-foreground h-9 w-9 touch-btn hidden"
                        aria-label="Share text"
                    >
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="16"
                            height="16"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <circle cx="18" cy="5" r="3" />
                            <circle cx="6" cy="12" r="3" />
                            <circle cx="18" cy="19" r="3" />
                            <path d="M8.59 13.51l6.83 3.98" />
                            <path d="M15.41 6.51l-6.82 3.98" />
                        </svg>
                    </button>
                    <!-- Char/Word Counter (between actions and layout) -->
                    <span
                        id="counter"
                        class="text-xs text-muted-foreground ml-1 sm:ml-2 hidden sm:inline"
                        >0 chars • 0 words</span
                    >
                </div>
                <div class="flex items-center gap-1.5 w-full sm:w-auto">
                    <button
                        id="action-layout"
                        class="inline-flex items-center justify-center rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 border border-input bg-background hover:bg-accent hover:text-accent-foreground h-9 px-3 gap-1.5 w-full sm:w-auto touch-btn"
                        aria-expanded="false"
                        aria-controls="layout-container"
                        aria-label="Toggle keyboard layout"
                    >
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="16"
                            height="16"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            class="opacity-90"
                        >
                            <rect width="20" height="16" x="2" y="4" rx="2" />
                            <path d="M6 8h.001" />
                            <path d="M10 8h.001" />
                            <path d="M14 8h.001" />
                            <path d="M18 8h.001" />
                            <path d="M8 12h.001" />
                            <path d="M12 12h.001" />
                            <path d="M16 12h.001" />
                            <path d="M7 16h10" />
                        </svg>
                        <span class="hidden sm:inline">Layout</span>
                        <span class="shortcut-tip hidden md-block">Ctrl+L</span>
                    </button>
                    <button
                        id="action-pin"
                        class="inline-flex items-center justify-center rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 border border-input bg-background hover:bg-accent hover:text-accent-foreground h-9 px-3 gap-1.5 w-full sm:w-auto touch-btn hidden"
                        aria-pressed="false"
                        aria-label="Pin layout to bottom"
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="opacity-90">
                            <line x1="12" y1="4" x2="12" y2="16"/>
                            <polyline points="8 8 12 4 16 8"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Editor -->
            <div class="relative w-full">
                <textarea
                    id="banglapad"
                    class="w-full rounded-lg border border-input bg-background px-4 py-3 text-lg ring-offset-background placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 font-bengali resize-y"
                    placeholder="এখানে বাংলা লিখুন..."
                    aria-label="Bangla text input area"
                    enterkeyhint="go"
                    inputmode="text"
                    autocapitalize="sentences"
                    spellcheck="true"
                ></textarea>

                <div
                    id="layout-container"
                    class="hidden mt-3 p-3 bg-card rounded-lg border border-input"
                    role="region"
                    aria-label="Probhat keyboard layout reference"
                >
                    <div class="flex justify-center overflow-x-auto">
                        <img
                            src="public/KB-Bengali-Probhat.svg"
                            class="max-w-full h-auto rounded-md border"
                            alt="Probhat Keyboard Layout"
                            loading="lazy"
                            decoding="async"
                        />
                    </div>
                </div>
            </div>
        </main>

        <!-- Instant Toast -->
        <div
            id="copy-toast"
            class="fixed bottom-4 left-1/2 -translate-x-1/2 z-50 hidden flex items-center gap-1.5 px-3 py-2 bg-foreground text-background text-xs font-medium rounded shadow"
        >
            <svg
                xmlns="http://www.w3.org/2000/svg"
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="3"
                stroke-linecap="round"
                stroke-linejoin="round"
            >
                <path d="M20 6 9 17l-5-5" />
            </svg>
            Copied
        </div>
    </body>
</html>
